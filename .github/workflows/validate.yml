name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-and-package:
    name: Shell, workflow, and package checks
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Go for actionlint
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24.x'
          cache: false

      - name: Check POSIX shell syntax
        run: |
          set -euo pipefail
          find packaging scripts -type f -name '*.sh' -print0 | xargs -0 -r -n1 sh -n
          sh -n packaging/termux/cliproxyapi

      - name: Run ShellCheck
        run: |
          set -euo pipefail
          mapfile -d '' scripts_to_check < <(find packaging scripts -type f -name '*.sh' -print0)
          shellcheck --severity=error "${scripts_to_check[@]}" packaging/termux/cliproxyapi

      - name: Run actionlint
        env:
          ACTIONLINT_VERSION: v1.7.7
        run: |
          set -euo pipefail
          go install "github.com/rhysd/actionlint/cmd/actionlint@${ACTIONLINT_VERSION}"
          "$(go env GOPATH)/bin/actionlint" -color

      - name: Build and validate a module fixture
        run: |
          set -euo pipefail
          install -Dm0755 /bin/true packaging/magisk/bin/cli-proxy-api
          printf '%s\n' '<!doctype html><title>CI fixture</title>' > packaging/magisk/static/management.html
          jq -n \
            --arg version 'v0.0.0' \
            --argjson versionCode 0 \
            --arg zipUrl 'https://example.invalid/cliproxyapi-magisk.zip' \
            --arg changelog 'https://example.invalid/releases/download/v0.0.0/release-notes.md' \
            '{version: $version, versionCode: $versionCode, zipUrl: $zipUrl, changelog: $changelog}' \
            > packaging/magisk/update.json
          VERSION=v0.0.0 VERSION_CODE=0 ./packaging/magisk/build-module.sh
          (
            cd dist/magisk
            sha256sum cliproxyapi-magisk.zip > checksums.txt
            cp ../../packaging/magisk/update.json update.json
            printf '%s\n' '{"releaseTag":"v0.0.0","source":{},"models":{},"dashboard":{},"toolchain":{}}' > provenance.json
            printf '%s\n' '# CI fixture' '' '## Upstream changes (v0.0.0)' '' '- Fixture change.' > release-notes.md
          )
          ./scripts/ci/validate-release-assets.sh dist/magisk
