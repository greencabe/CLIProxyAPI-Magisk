name: Release Magisk Module

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: 'CLIProxyAPI upstream release tag, empty = latest release'
        required: false
        type: string
      force:
        description: 'Rebuild release even if it already exists'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write

jobs:
  release:
    name: Build upstream CLIProxyAPI release as Android Magisk module
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout packaging repo
        uses: actions/checkout@v4
        with:
          path: cliproxyapi-magisk

      - name: Resolve upstream release
        id: upstream
        working-directory: cliproxyapi-magisk
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.upstream_tag }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_TAG:-}" ]; then
            json=$(gh api "repos/router-for-me/CLIProxyAPI/releases/tags/$INPUT_TAG")
          else
            json=$(gh api repos/router-for-me/CLIProxyAPI/releases/latest)
          fi
          tag=$(printf '%s' "$json" | jq -r .tag_name)
          version=${tag#v}
          sha=$(gh api "repos/router-for-me/CLIProxyAPI/git/ref/tags/$tag" --jq '.object.sha' 2>/dev/null || true)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Skip existing release
        id: existing
        working-directory: cliproxyapi-magisk
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.upstream.outputs.tag }}
          FORCE: ${{ inputs.force }}
        run: |
          set -euo pipefail
          if [ "$FORCE" != "true" ] && gh release view "$TAG" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists; skip"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout upstream CLIProxyAPI
        if: steps.existing.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: router-for-me/CLIProxyAPI
          ref: ${{ steps.upstream.outputs.tag }}
          path: cliproxyapi
          fetch-depth: 0

      - name: Set up Go
        if: steps.existing.outputs.skip != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: cliproxyapi/go.sum

      - name: Set up Android NDK
        if: steps.existing.outputs.skip != 'true'
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          local-cache: true

      - name: Resolve Android compiler
        if: steps.existing.outputs.skip != 'true'
        run: |
          set -euo pipefail
          cc=$(find "$ANDROID_NDK_HOME" -type f -name aarch64-linux-android24-clang | sort | head -1)
          if [ -z "$cc" ]; then
            cc=$(find "$ANDROID_NDK_HOME" -type f -name aarch64-linux-android21-clang | sort | head -1)
          fi
          [ -x "$cc" ] || { echo "Android clang not found" >&2; exit 1; }
          echo "ANDROID_CC=$cc" >> "$GITHUB_ENV"
          "$cc" --version

      - name: Refresh models catalog
        if: steps.existing.outputs.skip != 'true'
        working-directory: cliproxyapi
        run: |
          set -euo pipefail
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json

      - name: Build Android binary
        if: steps.existing.outputs.skip != 'true'
        working-directory: cliproxyapi
        env:
          TAG: ${{ steps.upstream.outputs.tag }}
          VERSION: ${{ steps.upstream.outputs.version }}
        run: |
          set -euo pipefail
          commit=$(git rev-parse --short HEAD)
          build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          mkdir -p ../cliproxyapi-magisk/packaging/magisk/bin
          CGO_ENABLED=1 GOOS=android GOARCH=arm64 CC="$ANDROID_CC" go build -buildvcs=false \
            -ldflags="-s -w -X main.Version=${VERSION} -X main.Commit=${commit} -X main.BuildDate=${build_date}" \
            -o ../cliproxyapi-magisk/packaging/magisk/bin/cli-proxy-api ./cmd/server/
          readelf -l ../cliproxyapi-magisk/packaging/magisk/bin/cli-proxy-api | grep -q '/system/bin/linker64'
          readelf -d ../cliproxyapi-magisk/packaging/magisk/bin/cli-proxy-api | grep -q 'libc.so'

      - name: Download dashboard asset
        if: steps.existing.outputs.skip != 'true'
        working-directory: cliproxyapi-magisk
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p packaging/magisk/static
          panel_json=$(gh api repos/router-for-me/Cli-Proxy-API-Management-Center/releases/latest)
          panel_url=$(printf '%s' "$panel_json" | jq -r '.assets[] | select(.name == "management.html") | .browser_download_url')
          panel_digest=$(printf '%s' "$panel_json" | jq -r '.assets[] | select(.name == "management.html") | .digest // ""')
          [ -n "$panel_url" ] || { echo "Missing management.html asset" >&2; exit 1; }
          curl -fL "$panel_url" -o packaging/magisk/static/management.html
          if [ -n "$panel_digest" ] && [ "$panel_digest" != "null" ]; then
            expected=${panel_digest#sha256:}
            actual=$(sha256sum packaging/magisk/static/management.html | awk '{print $1}')
            [ "$expected" = "$actual" ] || { echo "management.html checksum mismatch" >&2; exit 1; }
          fi

      - name: Update Magisk metadata
        if: steps.existing.outputs.skip != 'true'
        working-directory: cliproxyapi-magisk
        env:
          TAG: ${{ steps.upstream.outputs.tag }}
          VERSION: ${{ steps.upstream.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          code=$(printf '%s' "$VERSION" | awk -F. '{ printf "%d%03d%03d", $1, $2, $3 }')
          cat > packaging/magisk/update.json <<JSON
          {
            "version": "$TAG",
            "versionCode": $code,
            "zipUrl": "https://github.com/$REPO/releases/download/$TAG/cliproxyapi-magisk.zip",
            "changelog": "https://github.com/$REPO/releases/tag/$TAG"
          }
          JSON
          echo "version_code=$code" >> "$GITHUB_ENV"

      - name: Build Magisk module
        if: steps.existing.outputs.skip != 'true'
        working-directory: cliproxyapi-magisk
        env:
          VERSION: ${{ steps.upstream.outputs.tag }}
          VERSION_CODE: ${{ env.version_code }}
        run: ./packaging/magisk/build-module.sh

      - name: Generate checksums
        if: steps.existing.outputs.skip != 'true'
        working-directory: cliproxyapi-magisk
        run: |
          cd dist/magisk
          sha256sum cliproxyapi-magisk.zip > checksums.txt

      - name: Commit update metadata
        if: steps.existing.outputs.skip != 'true'
        working-directory: cliproxyapi-magisk
        env:
          TAG: ${{ steps.upstream.outputs.tag }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packaging/magisk/update.json
          git commit -m "chore: sync CLIProxyAPI $TAG" || true
          git push

      - name: Publish GitHub release
        if: steps.existing.outputs.skip != 'true'
        working-directory: cliproxyapi-magisk
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.upstream.outputs.tag }}
          UPSTREAM_SHA: ${{ steps.upstream.outputs.sha }}
        run: |
          set -euo pipefail
          gh release delete "$TAG" --yes --cleanup-tag >/dev/null 2>&1 || true
          git tag -f "$TAG"
          git push origin "refs/tags/$TAG" --force
          gh release create "$TAG" \
            dist/magisk/cliproxyapi-magisk.zip \
            dist/magisk/checksums.txt \
            --target "$(git rev-parse HEAD)" \
            --title "CLIProxyAPI Magisk $TAG" \
            --notes "ARM64 Android Magisk module built from upstream CLIProxyAPI $TAG at ${UPSTREAM_SHA:-unknown}. Android-native binary, dashboard bundled. Author: Rofiq."

      - name: Upload Magisk artifact
        if: steps.existing.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cliproxyapi-magisk-${{ steps.upstream.outputs.tag }}-arm64
          path: cliproxyapi-magisk/dist/magisk/cliproxyapi-magisk.zip
          if-no-files-found: error
